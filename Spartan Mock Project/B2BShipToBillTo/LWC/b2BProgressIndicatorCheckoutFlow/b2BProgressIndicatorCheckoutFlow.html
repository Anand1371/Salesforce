<template>
    <div class="slds-grid slds-gutters headingTxt">
        <div class="slds-col slds-text-align_right">
          <span>Shipping/Billing Address</span>
        </div>
        <div class="slds-col slds-text-align_center slds-m-left_medium">
          <span>Delivery Method</span>
        </div>
        <div class="slds-col slds-m-left_xx-large slds-p-left_large">
          <span>Order Review</span>
        </div>
        <div class="slds-col slds-m-left_x-large">
            <span>Payment</span>
          </div>
        <div class="slds-col">
          <span>Order Confirmation</span>
        </div>
    </div>
    <template if:true={currentStep}>
        <lightning-progress-indicator current-step={currentStep} type="base" variant="base">
            <template for:each={steps} for:item="step">
                <lightning-progress-step key={step.label} value={step.value}></lightning-progress-step>
            </template>
        </lightning-progress-indicator>
    </template>
</template>
